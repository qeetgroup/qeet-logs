name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  # Images publish as ghcr.io/<owner>/qeet-logs-<service> (matches deploy/helm).
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/qeet-logs

jobs:
  # ── Build + push multi-arch images, attest provenance, generate SBOMs ──────
  images:
    name: Image ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # keyless provenance attestation
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: query
            dockerfile: deploy/docker/Dockerfile.query
          - service: alerter
            dockerfile: deploy/docker/Dockerfile.alerter
          - service: lifecycle
            dockerfile: deploy/docker/Dockerfile.lifecycle
          - service: mcp
            dockerfile: deploy/docker/Dockerfile.mcp
          - service: ingest
            dockerfile: deploy/docker/Dockerfile.ingest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          if-no-files-found: error

  # ── Cut the GitHub release, attaching all SBOMs ────────────────────────────
  release:
    name: GitHub release
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          path: sboms
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: sboms/*.spdx.json