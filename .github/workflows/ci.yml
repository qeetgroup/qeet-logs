name: CI

on:
  push:
    branches: [develop, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go: query / alerter / lifecycle / mcp / migrate / ql ────────────────────
  go:
    name: Go (vet · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test (race)
        run: go test -race -count=1 ./...
      - name: go build
        run: go build ./...

  # ── Console: TanStack Start (bun workspace @qeet-logs/console) ──────────────
  console:
    name: Console (typecheck · build · biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run --filter '@qeet-logs/console' typecheck
      - name: Build
        run: bun run --filter '@qeet-logs/console' build
      - name: Biome check (repo-wide)
        run: bun run check

  # ── Rust ingest pipeline (gateway · writer · core) ─────────────────────────
  rust:
    name: Rust ingest (build · clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ingest
      - name: cargo build
        run: cargo build --workspace --locked
      # Clippy is advisory here — the toolchain floats on @stable, so a newer
      # release can introduce lints that should not block a merge.
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true

  # ── Migrations: prove reversibility (up → down -all → up) ──────────────────
  migrations:
    name: Migrations reversibility
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: qeet-logs
          POSTGRES_PASSWORD: qeet-logs
          POSTGRES_DB: qeet-logs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qeet-logs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_URL: postgres://qeet-logs:qeet-logs@localhost:5432/qeet-logs?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: migrate up
        run: go run ./cmd/migrate -url "$DB_URL" -dir migrations up
      - name: migrate down (all)
        run: go run ./cmd/migrate -url "$DB_URL" -dir migrations down -all
      - name: migrate up (again — proves every down is reversible)
        run: go run ./cmd/migrate -url "$DB_URL" -dir migrations up