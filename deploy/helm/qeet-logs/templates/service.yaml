apiVersion: v1
kind: Service
metadata:
  name: {{ include "qeet-logs.fullname" . }}-query
  labels:
    {{- include "qeet-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  type: {{ .Values.query.service.type }}
  ports:
    - port: {{ .Values.query.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "qeet-logs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: query
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qeet-logs.fullname" . }}-ingest
  labels:
    {{- include "qeet-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  type: {{ .Values.ingest.service.type }}
  ports:
    - port: {{ .Values.ingest.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.ingest.service.otlpPort }}
      targetPort: otlp
      protocol: TCP
      name: otlp
  selector:
    {{- include "qeet-logs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
