apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "qeet-logs.fullname" . }}
  labels:
    {{- include "qeet-logs.labels" . | nindent 4 }}
data:
  ENV: {{ .Values.config.env | quote }}
  CLICKHOUSE_DATABASE: {{ .Values.config.clickhouseDatabase | quote }}
  # Per-tenant request cap (requests/minute) on the query surfaces. Non-secret.
  RATE_LIMIT_PER_MINUTE: {{ .Values.config.rateLimitPerMinute | quote }}
