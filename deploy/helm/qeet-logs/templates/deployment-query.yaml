apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qeet-logs.fullname" . }}-query
  labels:
    {{- include "qeet-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  replicas: {{ .Values.query.replicaCount }}
  selector:
    matchLabels:
      {{- include "qeet-logs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: query
  template:
    metadata:
      labels:
        {{- include "qeet-logs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: query
    spec:
      containers:
        - name: query
          image: "{{ .Values.query.image.repository }}:{{ .Values.query.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.query.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "qeet-logs.fullname" . }}
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          env:
            - name: HTTP_PORT
              value: "8100"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.query.resources | nindent 12 }}
