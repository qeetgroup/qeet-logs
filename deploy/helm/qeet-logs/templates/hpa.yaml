{{- if .Values.query.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "qeet-logs.fullname" . }}-query
  labels:
    {{- include "qeet-logs.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "qeet-logs.fullname" . }}-query
  minReplicas: {{ .Values.query.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.query.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.query.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
---
{{- if .Values.ingest.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "qeet-logs.fullname" . }}-ingest
  labels:
    {{- include "qeet-logs.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "qeet-logs.fullname" . }}-ingest
  minReplicas: {{ .Values.ingest.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.ingest.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.ingest.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
