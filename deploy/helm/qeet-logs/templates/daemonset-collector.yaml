{{- if .Values.collector.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "qeet-logs.fullname" . }}-collector
  labels:
    {{- include "qeet-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
spec:
  selector:
    matchLabels:
      {{- include "qeet-logs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: collector
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-collector.yaml") . | sha256sum }}
      labels:
        {{- include "qeet-logs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: collector
    spec:
      serviceAccountName: {{ include "qeet-logs.fullname" . }}-collector
      containers:
        - name: collector
          image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.collector.image.pullPolicy }}
          args: ["--config=/etc/otel/config.yaml"]
          env:
            # Endpoint of the in-cluster ingest gateway; the OTLP/HTTP exporter
            # appends /v1/{logs,metrics,traces}.
            - name: QEET_LOGS_ENDPOINT
              value: "http://{{ include "qeet-logs.fullname" . }}-ingest:{{ .Values.ingest.service.httpPort }}"
            - name: QEET_LOGS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: INGEST_API_KEY
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
          livenessProbe:
            httpGet:
              path: /
              port: health
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "qeet-logs.fullname" . }}-collector
        - name: varlogpods
          hostPath:
            path: /var/log/pods
{{- end }}
