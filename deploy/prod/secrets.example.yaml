# ═════════════════════════════════════════════════════════════════════════════
#  Qeet Logs — `qeet-logs-secrets` Secret TEMPLATE
# ═════════════════════════════════════════════════════════════════════════════
#  ⚠️  DO NOT COMMIT REAL VALUES.  This is a placeholder template only.
#
#  The Helm chart (deploy/helm/qeet-logs) references this Secret BY NAME via
#  `secrets.existingSecret: qeet-logs-secrets` and never ships real values. The
#  key list below MUST match deploy/helm/qeet-logs/values.yaml `secrets:` exactly
#  (the query Deployment mounts them via envFrom + explicit secretKeyRefs).
#
#  RECOMMENDED: provision this out-of-band with External Secrets or Sealed
#  Secrets (both variants shown, commented, at the bottom) — NOT with this raw
#  manifest. The raw manifest is here only to document the full key contract and
#  for air-gapped/manual `kubectl` bootstrap.
#
#  Note: CLICKHOUSE_DATABASE is intentionally NOT here — it is non-secret and
#  comes from the ConfigMap (`config.clickhouseDatabase`).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: qeet-logs-secrets
  # namespace: qeet-logs        # set to your release namespace
  labels:
    app.kubernetes.io/name: qeet-logs
    app.kubernetes.io/managed-by: out-of-band   # NOT Helm-managed
type: Opaque
stringData:
  # ── REQUIRED ────────────────────────────────────────────────────────────────
  # Postgres metadata DB (tenancy, api_keys, dashboards, alert rules, DLQ, …).
  DATABASE_URL: "postgres://USER:PASSWORD@postgres-host:5432/qeet_logs?sslmode=require"
  # Redis — live-tail fan-out + per-tenant rate limits.
  REDIS_URL: "redis://:PASSWORD@redis-host:6379/0"
  # NATS JetStream — the ingestion bus.
  NATS_URL: "nats://nats-host:4222"
  # ClickHouse — log storage (HTTP endpoint).
  CLICKHOUSE_URL: "http://clickhouse-host:8123"
  CLICKHOUSE_USER: "qeet_logs"
  CLICKHOUSE_PASSWORD: "CHANGE_ME"
  # Qeet ID OIDC issuer (console auth / OIDC relying party).
  QEET_ID_ISSUER: "https://id.qeet.in"
  # *** REQUIRED IN PROD *** envelope-encryption key for secrets at rest
  # (e.g. Slack bot tokens). The query pod WILL NOT START without it.
  # Generate with:  openssl rand -base64 32
  QEET_LOGS_SECRETS_KEY: "REPLACE_WITH_openssl_rand_base64_32"

  # ── OPTIONAL (feature-gated — absence just disables that feature) ─────────────
  # AI copilot (governed LLM). Unset ⇒ /v1/query/copilot* returns 501.
  # ANTHROPIC_API_KEY: "sk-ant-..."
  # Two-way ChatOps (Slack app). Unset ⇒ /v1/chatops/slack/* returns 501.
  # SLACK_CLIENT_ID: "..."
  # SLACK_CLIENT_SECRET: "..."
  # SLACK_SIGNING_SECRET: "..."
  # SLACK_REDIRECT_URL: "https://api.logs.qeet.in/v1/chatops/slack/oauth/callback"
  # Alert / notification delivery via Qeet Notify.
  # QEET_NOTIFY_URL: "https://notify.qeet.in"
  # QEET_NOTIFY_API_KEY: "..."
  # Only needed when collector.enabled=true (OTel Collector DaemonSet).
  # INGEST_API_KEY: "..."

