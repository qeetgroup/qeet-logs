# ═════════════════════════════════════════════════════════════════════════════
#  RECOMMENDED VARIANT B — Sealed Secrets (encrypt this manifest, commit safely)
# ═════════════════════════════════════════════════════════════════════════════
#  Fill the plain Secret above with real values in a throwaway file, then seal it
#  so the CIPHERTEXT (safe to commit) reconciles into `qeet-logs-secrets`:
#
#    kubeseal --controller-namespace kube-system \
#             --format yaml < qeet-logs-secrets.plain.yaml > qeet-logs-sealedsecret.yaml
#    # commit qeet-logs-sealedsecret.yaml (encrypted); DELETE the plain file.
#
#  The controller decrypts it in-cluster into the exact Secret name below.
# ─────────────────────────────────────────────────────────────────────────────
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: qeet-logs-secrets
#   namespace: qeet-logs
# spec:
#   template:
#     metadata:
#       name: qeet-logs-secrets        # MUST match secrets.existingSecret
#       namespace: qeet-logs
#     type: Opaque
#   encryptedData:
#     # kubeseal fills these with per-key ciphertext (safe to commit):
#     DATABASE_URL:         AgB...==
#     REDIS_URL:            AgB...==
#     NATS_URL:             AgB...==
#     CLICKHOUSE_URL:       AgB...==
#     CLICKHOUSE_USER:      AgB...==
#     CLICKHOUSE_PASSWORD:  AgB...==
#     QEET_ID_ISSUER:       AgB...==
#     QEET_LOGS_SECRETS_KEY: AgB...==   # REQUIRED
#     # …optional keys as needed (ANTHROPIC_API_KEY, SLACK_*, QEET_NOTIFY_*, INGEST_API_KEY)
