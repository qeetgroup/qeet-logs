  - name: Timeline
    description: Unified cross-signal investigation timeline.
  - name: Incidents
    description: Correlation-first incident feed.
  - name: RCA
    description: Root-cause analysis — structural retrieval.
  - name: Dashboards
    description: Dashboard overlays and public sharing.
  - name: Admin — API Keys
  - name: Admin — Alerting
  - name: Admin — Retention
  - name: Admin — Transform
